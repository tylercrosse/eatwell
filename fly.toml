# Fly.io config. Adjust `app` to a unique name, then:
#   fly launch --no-deploy        # or `fly apps create <name>`
#   fly volumes create data --size 1 --region <region>
#   fly secrets set OPENROUTER_API_KEY=sk-or-v1-...
#   fly deploy
app = "calorie-tracker"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  # CORS only matters if you later split the frontend onto another origin.
  CORS_ORIGINS = "https://calorie-tracker.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      method = "get"
      path = "/api/health"
      interval = "30s"
      timeout = "5s"

# Persist SQLite DB + uploaded photos across restarts/redeploys.
[mounts]
  source = "data"
  destination = "/data"
