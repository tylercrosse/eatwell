# fly.toml app configuration file generated for calorie-tracker-dawn-thunder-2086 on 2026-05-31T18:59:14+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'calorie-tracker-dawn-thunder-2086'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGINS = 'https://calorie-tracker.fly.dev'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
